---
- name: Install and configure Apache web server
  hosts: webservers
  become: yes

  tasks:
    - name: Install Apache package
      dnf:
        name: httpd
        state: present

    - name: Start and enable Apache service
      service:
        name: httpd
        state: started
        enabled: yes

    - name: Deploy custom index page
      copy:
        dest: /var/www/html/index.html
        content: |
          <h1>Apache deployed using Ansible</h1>
          <p>This web server was configured automatically from Ansible control node.</p>
